<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forward Recipe Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #c8922a;
    --navy: #1c3664;
    --ink: #111111;
    --body: #333333;
    --muted: #767676;
    --border: #dddddd;
    --bg: #ffffff;
    --bg-light: #f7f7f7;
    --bg-nav: #f2f2f2;
    --red: #cc2200;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--body); font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; font-size: 15px; line-height: 1.5; }
  a { color: inherit; text-decoration: none; }

  .masthead { background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 16px 24px 12px; position: sticky; top: 0; z-index: 200; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .forward-logo-svg { display: block; margin: 0 auto 4px; } .forward-logo-svg svg { height: 38px; width: auto; display: block; }
  .masthead-tagline { font-size: 9.5px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; font-weight: 400; }

  .page-header { text-align: center; padding: 32px 24px 28px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .page-header-label { display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--ink); padding-bottom: 6px; border-bottom: 2px solid var(--gold); margin-bottom: 14px; }
  .page-header-title { font-family: 'Libre Baskerville', Georgia, serif; font-size: 42px; font-weight: 700; color: var(--ink); line-height: 1.15; margin-bottom: 12px; }
  .page-header-subtitle { font-size: 15px; color: var(--muted); max-width: 520px; margin: 0 auto; line-height: 1.6; }

  /* Loading state */
  .data-loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px 20px; color: var(--muted); font-style: italic; font-size: 14px; }
  .data-loading-dots { display: inline-flex; gap: 5px; }
  .data-loading-dots span { width: 7px; height: 7px; background: var(--gold); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .data-loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .data-loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity:0.4; } 40% { transform: scale(1); opacity:1; } }

  .data-error { text-align: center; padding: 60px 20px; }
  .data-error h3 { font-family: 'Libre Baskerville', serif; font-size: 20px; margin-bottom: 10px; color: var(--ink); }
  .data-error p { color: var(--muted); font-size: 14px; }
  .data-error button { margin-top: 16px; padding: 10px 20px; background: var(--navy); color: white; border: none; cursor: pointer; font-size: 13px; font-weight: 700; font-family: 'Source Sans 3', sans-serif; }

  .last-updated { font-size: 11px; color: var(--muted); text-align: right; margin-bottom: 10px; font-style: italic; }

  .layout { display: grid; grid-template-columns: 260px 1fr; max-width: 1280px; margin: 0 auto; min-height: calc(100vh - 130px); }

  .sidebar { border-right: 1px solid var(--border); padding: 20px 18px; overflow-y: auto; position: sticky; top: 62px; height: calc(100vh - 62px); background: var(--bg); }
  .sidebar-section { margin-bottom: 22px; }
  .sidebar-label { font-size: 10px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--ink); margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border); }

  .search-wrap { position: relative; }
  .search-input { width: 100%; padding: 8px 10px 8px 30px; font-family: 'Source Sans 3', sans-serif; font-size: 13px; border: 1px solid var(--border); background: var(--bg); color: var(--ink); outline: none; transition: border-color 0.2s; border-radius: 2px; }
  .search-input:focus { border-color: var(--gold); }
  .search-input::placeholder { color: #aaa; }
  .search-icon-inner { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; color: #aaa; pointer-events: none; }

  .filter-chip { display: inline-block; padding: 3px 9px; margin: 2px 2px; font-size: 11.5px; border: 1px solid var(--border); cursor: pointer; transition: all 0.12s; background: var(--bg); color: var(--body); font-family: 'Source Sans 3', sans-serif; border-radius: 2px; line-height: 1.6; }
  .filter-chip:hover { border-color: var(--gold); color: var(--gold); }
  .filter-chip.active { background: var(--gold); color: white; border-color: var(--gold); font-weight: 600; }

  .clear-btn { width: 100%; padding: 8px; margin-top: 14px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'Source Sans 3', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; border-radius: 2px; }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  .main { padding: 20px 28px; background: var(--bg); }
  .results-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 2px solid var(--ink); }
  .results-count { font-family: 'Libre Baskerville', serif; font-size: 20px; color: var(--ink); }
  .results-count strong { color: var(--gold); }
  .results-meta { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 600; }

  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .recipe-card { background: var(--bg); display: flex; flex-direction: column; padding: 16px 18px 14px; text-decoration: none; color: inherit; transition: background 0.12s; }
  .recipe-card:hover { background: #fffbf4; }
  .recipe-card:hover .card-title { color: var(--gold); }
  .card-section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .card-title { font-family: 'Libre Baskerville', Georgia, serif; font-size: 15px; font-weight: 700; line-height: 1.35; color: var(--ink); margin-bottom: 8px; transition: color 0.12s; flex: 1; }
  .card-byline { font-size: 11.5px; color: var(--muted); margin-bottom: 8px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border); }
  .tag { font-size: 10px; font-family: 'Source Sans 3', sans-serif; font-weight: 600; padding: 2px 6px; border-radius: 2px; letter-spacing: 0.3px; text-transform: uppercase; }
  .tag-dietary { background: #eef7ee; color: #2a6a2a; }
  .tag-holiday { background: #fff8e6; color: #7a5200; }
  .tag-easy { background: #eef7ee; color: #2a6a2a; }
  .tag-moderate { background: #fff3e0; color: #8a4f00; }
  .tag-advanced { background: #fdecea; color: #a00000; }

  .no-results { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); background: var(--bg); }
  .no-results h3 { font-family: 'Libre Baskerville', serif; font-size: 22px; margin-bottom: 8px; color: var(--ink); font-style: italic; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    .main { padding: 16px; }
  }
</style>
</head>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTuuHfX9NnjydZ8WBectYQlw3HBBaXle1n49XUd7uXiNHFVIu-7c52eMbXhZIBncw/pub?output=csv';

// ── CSV PARSER ──
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());

  // Find the header row — it contains '#' as first column
  let headerIdx = -1;
  for (let i = 0; i < Math.min(5, lines.length); i++) {
    if (lines[i].includes('#') && lines[i].toLowerCase().includes('title')) {
      headerIdx = i;
      break;
    }
  }
  if (headerIdx === -1) headerIdx = 0;

  const headers = splitCSVRow(lines[headerIdx]);

  const recipes = [];
  for (let i = headerIdx + 1; i < lines.length; i++) {
    const values = splitCSVRow(lines[i]);
    if (!values[0] || !values[0].trim()) continue;
    const row = {};
    headers.forEach((h, idx) => {
      row[h.trim()] = (values[idx] || '').trim();
    });
    // Only include rows that have a title and URL
    if (row['Title'] && row['URL']) recipes.push(row);
  }
  return recipes;
}

function splitCSVRow(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
      else { inQuotes = !inQuotes; }
    } else if (ch === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

// ── STATE ──
let RECIPES = [];
let activeFilters = { complexity: new Set(), dietary: new Set(), course: new Set(), holiday: new Set(), vibe: new Set() };
let searchQuery = '';

// ── FILTER MATCHING ──
function norm(s) { return (s || '').toLowerCase().trim(); }

function matchesFilter(recipe, activeFilters, searchQuery) {
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    const s = [recipe['Title'], recipe['Primary Ingredients'], recipe['Cuisine'],
      recipe['Dish Type'], recipe['Vibe'], recipe['Course']].join(' ').toLowerCase();
    if (!s.includes(q)) return false;
  }
  const checks = [
    ['complexity', 'Complexity'],
    ['dietary',   'Dietary'],
    ['course',    'Course'],
    ['holiday',   'Holiday / Occasion'],
    ['vibe',      'Vibe'],
  ];
  for (const [key, field] of checks) {
    if (activeFilters[key].size > 0) {
      const val = norm(recipe[field]);
      if (![...activeFilters[key]].some(f => val.includes(norm(f)))) return false;
    }
  }
  return true;
}

// ── FILTER UI ──
const HOLIDAY_MAIN = ['Shabbat','Rosh Hashanah','Hanukkah','Passover','Purim','Sukkot',
  'Yom Kippur','Shavuot','Thanksgiving',"Tu B'Shvat","Tu B'Av",'High Holidays','General'];
const COURSE_MAIN = ['Main','Appetizer','Side','Dessert','Soup','Bread','Breakfast','Salad','Drink','Snack','Condiment','Feature'];
const VIBE_LIST   = ['Classic','Nostalgic','Modern','Festive','Comfort','Elegant','Bold',
  'Creative','Healthy','Weeknight','Traditional','Seasonal','Fusion','Historical',
  'Indulgent','Warming','Brunch','Party','Romantic','Simple','Refreshing'];

function makeChips(containerId, items, filterKey) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  items.forEach(item => {
    const chip = document.createElement('span');
    chip.className = 'filter-chip';
    chip.textContent = item;
    chip.addEventListener('click', () => {
      if (activeFilters[filterKey].has(item)) {
        activeFilters[filterKey].delete(item);
        chip.classList.remove('active');
      } else {
        activeFilters[filterKey].add(item);
        chip.classList.add('active');
      }
      renderGrid();
    });
    container.appendChild(chip);
  });
}

function initFilters() {
  makeChips('complexityFilters', ['Easy','Intermediate','Moderate','Advanced'], 'complexity');
  makeChips('dietaryFilters',    ['Vegan','Vegetarian','Pareve','Dairy','Meat','Gluten-Free','Kosher'], 'dietary');
  makeChips('courseFilters',     COURSE_MAIN, 'course');
  makeChips('holidayFilters',    HOLIDAY_MAIN, 'holiday');
  makeChips('vibeFilters',       VIBE_LIST, 'vibe');
}

// ── GRID ──
function complexityClass(c) {
  const cl = (c||'').toLowerCase();
  if (cl.includes('advanced')) return 'tag-advanced';
  if (cl.includes('intermediate') || cl.includes('moderate')) return 'tag-moderate';
  return 'tag-easy';
}

function renderGrid() {
  const appState = document.getElementById('appState');
  const filtered = RECIPES.filter(r => matchesFilter(r, activeFilters, searchQuery));
  const total = Object.values(activeFilters).reduce((s, set) => s + set.size, 0);

  appState.innerHTML = `
    <div class="results-bar">
      <div class="results-count"><strong>${filtered.length}</strong> recipe${filtered.length !== 1 ? 's' : ''}</div>
      <div class="results-meta">${(total > 0 || searchQuery) ? total + ' filter' + (total !== 1 ? 's' : '') + ' active' : 'All recipes · Updated live from spreadsheet'}</div>
    </div>
    <div class="recipe-grid" id="recipeGrid">
      ${filtered.length === 0
        ? `<div class="no-results"><h3>No recipes found.</h3><p>Try adjusting your filters.</p></div>`
        : filtered.map(recipe => {
            const dietary  = (recipe['Dietary']||'').split('/')[0].trim();
            const complexity = recipe['Complexity'] || '';
            const holiday  = (recipe['Holiday / Occasion']||'').split('/')[0].split('(')[0].trim();
            const showHoliday = holiday && !['General','Various','varies'].includes(holiday.toLowerCase());
            return `<a class="recipe-card" href="${recipe['URL']}" target="_blank" rel="noopener">
              <div class="card-section-label">${recipe['Dish Type'] || 'Recipe'}</div>
              <div class="card-title">${recipe['Title']}</div>
              <div class="card-byline">${recipe['Date']}${recipe['Cuisine'] ? ' &nbsp;·&nbsp; ' + recipe['Cuisine'] : ''}</div>
              <div class="card-tags">
                ${complexity ? `<span class="tag ${complexityClass(complexity)}">${complexity}</span>` : ''}
                ${dietary    ? `<span class="tag tag-dietary">${dietary}</span>` : ''}
                ${showHoliday ? `<span class="tag tag-holiday">${holiday}</span>` : ''}
              </div>
            </a>`;
          }).join('')
      }
    </div>`;
}

document.getElementById('searchBox').addEventListener('input', e => { searchQuery = e.target.value; renderGrid(); });
document.getElementById('clearBtn').addEventListener('click', () => {
  activeFilters = { complexity: new Set(), dietary: new Set(), course: new Set(), holiday: new Set(), vibe: new Set() };
  searchQuery = '';
  document.getElementById('searchBox').value = '';
  document.querySelectorAll('.filter-chip.active').forEach(c => c.classList.remove('active'));
  renderGrid();
});

// ── LOAD DATA ──
async function loadRecipes() {
  const appState = document.getElementById('appState');
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('Network response was not ok');
    const text = await res.text();
    RECIPES = parseCSV(text);
    if (RECIPES.length === 0) throw new Error('No recipes parsed from spreadsheet');
    initFilters();
    renderGrid();
  } catch (err) {
    appState.innerHTML = `
      <div class="data-error">
        <h3>Couldn't load recipes</h3>
        <p>There was a problem fetching the spreadsheet data.</p>
        <p style="margin-top:8px;font-size:12px;color:#aaa">${err.message}</p>
        <button onclick="loadRecipes()">Try Again</button>
      </div>`;
  }
}

loadRecipes();
</script>
